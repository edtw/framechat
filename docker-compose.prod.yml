services:
  postgres:
    ports: []
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    ports: []
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}

  backend:
    ports: []
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/afiliators?schema=public
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://afiliators.com}
      - BACKEND_API_KEY=${BACKEND_API_KEY}
      - AI_HANDLER_URL=http://ai-handler:8000
      - WHATSAPP_SERVICE_API_KEY=${WHATSAPP_SERVICE_API_KEY}
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:3006
    volumes: []
    command: sh -c "npx prisma migrate deploy && node server.js"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3005/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  whatsapp-service:
    ports: []
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:3005
      - BACKEND_API_KEY=${WHATSAPP_SERVICE_API_KEY}
      - AI_HANDLER_URL=http://ai-handler:8000
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - CORS_ORIGIN=${CORS_ORIGIN:-https://afiliators.com}
      - SESSIONS_PATH=/app/sessions
      - LOG_LEVEL=warn
    volumes:
      - whatsapp_sessions:/app/sessions

  ai-handler:
    ports: []
    environment:
      - DEBUG=False
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379

  frontend:
    ports: []
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://afiliators.com
      - HOSTNAME=0.0.0.0
      - NEXT_TELEMETRY_DISABLED=1
    command: ["node", "server.js"]
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]

  nginx:
    image: nginx:alpine
    container_name: afiliators-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/letsencrypt:ro
      - ./nginx/certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always
    command: /bin/sh -c "sleep 10; nginx -g 'daemon off;'"

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  whatsapp_sessions:
    driver: local
