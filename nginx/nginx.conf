events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # --- HTTP: Redirect to HTTPS ---
    server {
        listen 80;
        listen [::]:80;
        server_name afiliators.com www.afiliators.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: Main Application ---
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name afiliators.com www.afiliators.com;

        # SSL - Self-signed placeholder (replace with Let's Encrypt)
        # Generate with: openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
        #   -keyout /etc/nginx/ssl/privkey.pem -out /etc/nginx/ssl/fullchain.pem
        ssl_certificate     /etc/letsencrypt/live/afiliators.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/afiliators.com/privkey.pem;

        # Fallback to self-signed if Let's Encrypt certs don't exist yet
        # (nginx will fail to start if the file doesn't exist; use a self-signed
        #  cert at that path initially, then certbot will replace it)

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers off;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # API - Backend
        location /api {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://backend:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # WebSocket - Socket.io
        location /socket.io {
            proxy_pass http://backend:3005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 86400s;
            proxy_buffering off;
        }

        # Frontend
        location / {
            proxy_pass http://frontend:3001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
